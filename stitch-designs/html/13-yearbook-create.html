<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a90ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display bg-slate-200 flex items-center justify-center min-h-screen">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
<!-- Modal Container -->
<div class="bg-white dark:bg-background-dark w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col">
<!-- Header -->
<div class="px-8 py-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100">新建年鉴</h2>
<button class="text-slate-400 hover:text-slate-600 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Content Body -->
<div class="p-8 space-y-8 overflow-y-auto max-h-[80vh]">
<!-- Form Section: Basic Info -->
<div class="space-y-4">
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 block">年鉴名称</span>
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="江苏年鉴2026" type="text"/>
</label>
<div class="grid grid-cols-2 gap-6">
<label class="block relative">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 block">开始日期</span>
<div class="relative">
<input class="w-full h-12 px-4 pr-10 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none cursor-pointer" type="text" value="2026-01-01"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">calendar_month</span>
</div>
</label>
<label class="block relative">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 block">结束日期</span>
<div class="relative">
<input class="w-full h-12 px-4 pr-10 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none cursor-pointer" type="text" value="2026-12-31"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">calendar_month</span>
</div>
</label>
</div>
</div>
<!-- Section: Cover Selection -->
<div class="space-y-4">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 block">封面选择</span>
<div class="grid grid-cols-4 gap-4">
<!-- Default Covers -->
<div class="relative aspect-[3/4] rounded-lg overflow-hidden border-2 border-primary group cursor-pointer ring-4 ring-primary/10">
<img alt="Classic elegant book cover" class="w-full h-full object-cover" data-alt="Classic elegant book cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCpi-ucXjRtKLWLygz4RXm1A_I5Gkk2YHOeeqvqTqYHDh3sQ0YbxUNGPF8TcZQIiSlOeSAs_NsddKAVmgYA2QK_0sGW_UuR6cOxZ9QITcW0TsBa0b0C-s20VSQ0Cr3VFG50ZjjMJeepiUiohFR1nMqr-mPfz7AC376vNeiCcleF960CtkUOXNQ4wGskxrl3TYk664E5asnnM8J_roYYbKzmM_3SOyjB1Gy0bsJ3DCqlaDqpJhd7423m0Kt62eKQl_NgwuZ4JSMNY6f"/>
<div class="absolute inset-0 bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-white bg-primary rounded-full p-1">check</span>
</div>
</div>
<div class="relative aspect-[3/4] rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 hover:border-primary transition-colors cursor-pointer">
<img alt="Minimalist book cover design" class="w-full h-full object-cover" data-alt="Minimalist book cover design" src="https://lh3.googleusercontent.com/aida-public/AB6AXuClPCQXQusudBuQtwRSUkv-UFwipBz7OMpGcbXfDfRCsp9ZYRnrPnreJTnzrReu1m0nKzF6Fl5gF2da2zbcjl2t_Mza3AFGxz0MC3IU3621UYbKdER4jhnxeL8qranem0WXOtaVENqdxcAi8gB5ANZsn7eBRiRnRVFZMU5mz2TGoFl8ut_tFXtDsLecjH6YAG26QpZC7g7Tn_x7ZytPXHYFfmLXkaua_aGKcExq_n0piARPfNSmj_RidP87CkfW6m1WKxtRaAI2vDza"/>
</div>
<div class="relative aspect-[3/4] rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 hover:border-primary transition-colors cursor-pointer">
<img alt="Modern artistic book cover" class="w-full h-full object-cover" data-alt="Modern artistic book cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwEZbgZQavKjPBAc_ZyVSLs2nRvYJAun9YtvyviPo4ET7zoSbjh3FW4oC080dPujZ_Vq1ixFLLqNAGWFMiexSADi5wlMgYuo0sEdvJUYkH4L4vPzN-2JjQWrvXmhF0sSom6a6hLcHG4ybrUd8MuFft_bwJmjlE2Lm6wKDzL85ud5EgvSg-Gi9LapjJIwrklj3fIbkniVAijx006SrcQU7hBlEhWwiQCW0LBKip7AEZ_E6i2kLOhC6vKsREOHNGiRkL-cYGbbx9jf8S"/>
</div>
<!-- Upload Area -->
<div class="aspect-[3/4] rounded-lg border-2 border-dashed border-slate-300 dark:border-slate-700 hover:border-primary hover:bg-primary/5 transition-all cursor-pointer flex flex-col items-center justify-center text-center p-2">
<span class="material-symbols-outlined text-slate-400 mb-2">cloud_upload</span>
<span class="text-xs text-slate-500 font-medium">jpg/jpeg/png</span>
<span class="text-[10px] text-slate-400">不超过10M</span>
</div>
</div>
</div>
<!-- Section: Responsible Persons -->
<div class="space-y-4">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 block">负责人</span>
<div class="flex flex-wrap gap-2 items-center">
<div class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full">
<div class="w-5 h-5 rounded-full bg-primary/20 flex items-center justify-center text-[10px] font-bold text-primary">张</div>
<span class="text-sm text-slate-700 dark:text-slate-300">张三</span>
<button class="hover:text-red-500 transition-colors flex items-center">
<span class="material-symbols-outlined text-base">close</span>
</button>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full">
<div class="w-5 h-5 rounded-full bg-primary/20 flex items-center justify-center text-[10px] font-bold text-primary">李</div>
<span class="text-sm text-slate-700 dark:text-slate-300">李四</span>
<button class="hover:text-red-500 transition-colors flex items-center">
<span class="material-symbols-outlined text-base">close</span>
</button>
</div>
<button class="flex items-center gap-1 px-4 py-1.5 text-primary hover:bg-primary/10 rounded-full transition-colors font-medium text-sm">
<span class="material-symbols-outlined text-lg">add</span>
                            添加
                        </button>
</div>
</div>
</div>
<!-- Footer Action Buttons -->
<div class="px-8 py-6 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-3">
<button class="px-6 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-200 dark:hover:bg-slate-800 transition-all">
                    取消
                </button>
<button class="px-8 py-2.5 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">
                    确认创建
                </button>
</div>
</div>
</div>
</body></html>
