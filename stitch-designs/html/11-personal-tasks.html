<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a90ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<title>智能年鉴编纂系统 - 个人中心</title>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<!-- Background Mockup (Simulated Main Screen) -->
<div class="fixed inset-0 z-0 overflow-hidden flex flex-col">
<header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary size-8 rounded flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm">book</span>
</div>
<span class="font-bold text-lg text-primary">智能年鉴编纂系统</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400">notifications</span>
<div class="size-8 rounded-full bg-slate-200"></div>
</div>
</header>
<main class="flex-1 flex">
<aside class="w-64 bg-slate-50 border-r border-slate-200 p-4 space-y-2">
<div class="h-8 bg-slate-200 rounded-lg w-full"></div>
<div class="h-8 bg-slate-200 rounded-lg w-3/4"></div>
<div class="h-8 bg-slate-200 rounded-lg w-5/6"></div>
</aside>
<section class="flex-1 p-8 grid grid-cols-3 gap-6">
<div class="col-span-2 space-y-4">
<div class="h-40 bg-white border border-slate-200 rounded-xl shadow-sm"></div>
<div class="h-96 bg-white border border-slate-200 rounded-xl shadow-sm"></div>
</div>
<div class="space-y-4">
<div class="h-64 bg-white border border-slate-200 rounded-xl shadow-sm"></div>
<div class="h-64 bg-white border border-slate-200 rounded-xl shadow-sm"></div>
</div>
</section>
</main>
</div>
<!-- Overlay Mask -->
<div class="fixed inset-0 z-10 bg-slate-900/40 backdrop-blur-[2px]"></div>
<!-- Modal Container -->
<div class="fixed inset-0 z-20 flex items-center justify-center p-4">
<div class="bg-white dark:bg-slate-900 w-full max-w-[520px] rounded-xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Modal Header / Profile Info -->
<div class="pt-8 pb-6 px-8 flex flex-col items-center border-b border-slate-100 dark:border-slate-800">
<div class="size-20 bg-primary rounded-full flex items-center justify-center text-white text-3xl font-bold mb-6 shadow-lg shadow-primary/20">
                    张
                </div>
<div class="w-full space-y-1.5">
<label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">姓名</label>
<div class="relative group">
<input class="w-full h-11 pl-4 pr-10 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-medium" type="text" value="张三"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 group-hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-xl">edit</span>
</div>
</div>
</div>
</div>
<!-- Modal Body / Tasks -->
<div class="flex-1 overflow-y-auto max-h-[400px] p-6 space-y-6">
<div>
<h3 class="flex items-center gap-2 text-slate-900 dark:text-slate-100 font-bold text-lg mb-4">
<span class="material-symbols-outlined text-primary">assignment_ind</span>
                        我的任务
                    </h3>
<!-- Task Group 1 -->
<div class="space-y-3 mb-6">
<div class="flex items-center gap-2 text-sm font-semibold text-slate-600 dark:text-slate-400 px-2">
<span>📚</span>
<span>江苏年鉴2025</span>
</div>
<div class="space-y-1">
<!-- Task Row -->
<div class="group flex flex-col gap-1.5 p-3 rounded-lg hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors cursor-pointer border border-transparent hover:border-primary/10">
<div class="flex justify-between items-start">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">政治 &gt; 中共江苏省委 &gt; 重要会议</span>
<span class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-primary/10 text-primary text-[10px] font-bold">
<span class="size-1.5 rounded-full bg-primary"></span>
                                        编辑中
                                    </span>
</div>
<div class="text-xs text-slate-400 font-normal">
                                    2025-01-01 ~ 2025-12-31
                                </div>
</div>
<!-- Task Row -->
<div class="group flex flex-col gap-1.5 p-3 rounded-lg hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors cursor-pointer border border-transparent hover:border-primary/10">
<div class="flex justify-between items-start">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">政治 &gt; 中共江苏省委 &gt; 重要决策</span>
<span class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 text-[10px] font-bold">
<span class="size-1.5 rounded-full border border-slate-400"></span>
                                        未开始
                                    </span>
</div>
<div class="text-xs text-slate-400 font-normal">
                                    2025-01-01 ~ 2025-12-31
                                </div>
</div>
</div>
</div>
<!-- Task Group 2 -->
<div class="space-y-3">
<div class="flex items-center gap-2 text-sm font-semibold text-slate-600 dark:text-slate-400 px-2">
<span>📚</span>
<span>江苏年鉴2024</span>
</div>
<div class="space-y-1">
<!-- Task Row -->
<div class="group flex flex-col gap-1.5 p-3 rounded-lg hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors cursor-pointer border border-transparent hover:border-primary/10">
<div class="flex justify-between items-start">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">经济 &gt; 综合经济 &gt; GDP总量</span>
<span class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 text-[10px] font-bold">
<span class="material-symbols-outlined text-xs">check</span>
                                        已提交
                                    </span>
</div>
<div class="text-xs text-slate-400 font-normal">
                                    2024-01-01 ~ 2024-12-31
                                </div>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="p-6 bg-slate-50 dark:bg-slate-800/50 flex items-center justify-end gap-3 border-t border-slate-100 dark:border-slate-800">
<button class="px-5 py-2 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    取消
                </button>
<button class="px-6 py-2 rounded-lg text-sm font-semibold text-white bg-primary hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">
                    保存修改
                </button>
</div>
</div>
</div>
</body></html>
