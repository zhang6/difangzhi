<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a90ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                        "danger": "#ef4444",
                        "warning": "#f59e0b"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden transform transition-all border border-slate-200 dark:border-slate-800">
<!-- Header/Top Bar (Minimal) -->
<div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-2 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-primary text-xl">delete_sweep</span>
<h2 class="text-sm font-bold tracking-tight">删除确认</h2>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-lg">close</span>
</button>
</div>
<!-- Content Section -->
<div class="flex flex-col items-center px-8 py-10 text-center">
<!-- Warning Icon Container -->
<div class="mb-6 flex items-center justify-center size-20 rounded-full bg-warning/10 text-warning">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1">warning</span>
</div>
<!-- Text Content -->
<h3 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-3">
                    确定要删除《江苏年鉴2025》吗？
                </h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed max-w-[280px]">
                    删除后将无法恢复，所有相关数据都将被清除。请谨慎操作。
                </p>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row-reverse gap-3 px-8 pb-8">
<button class="flex-1 min-h-[48px] px-6 bg-danger hover:bg-danger/90 text-white text-sm font-bold rounded-lg transition-all shadow-lg shadow-danger/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">delete_forever</span>
                    确认删除
                </button>
<button class="flex-1 min-h-[48px] px-6 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 text-sm font-bold rounded-lg transition-all flex items-center justify-center">
                    取消
                </button>
</div>
</div>
</div>
<!-- Background Mockup Content (Blurred) -->
<div class="layout-container flex h-screen flex-col blur-md select-none pointer-events-none">
<header class="flex items-center justify-between border-b border-slate-200 bg-white px-40 py-3">
<div class="flex items-center gap-4">
<div class="size-8 bg-primary rounded flex items-center justify-center text-white">
<span class="material-symbols-outlined">menu_book</span>
</div>
<h2 class="text-lg font-bold">后台管理系统</h2>
</div>
</header>
<main class="px-40 py-10">
<div class="h-64 w-full rounded-xl bg-slate-200 border-2 border-dashed border-slate-300"></div>
</main>
</div>
</body></html>
