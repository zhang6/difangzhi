spring:
  application:
    name: yearbook-backend

  datasource:
    # Supabase Transaction Pooler（推荐）: jdbc:postgresql://aws-0-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
    # Supabase Direct Connection: jdbc:postgresql://db.tqdosxaesqbwbhngvndj.supabase.co:5432/postgres
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.tqdosxaesqbwbhngvndj}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        # 兼容 Supabase Pooler
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:Y2hyb25pY2xlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjQ=}
  expiration: 86400000

supabase:
  url: ${SUPABASE_URL:}
  key: ${SUPABASE_SERVICE_KEY:}
  bucket: ${SUPABASE_BUCKET:yearbook-files}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.chronicle: DEBUG
    org.hibernate.SQL: WARN
