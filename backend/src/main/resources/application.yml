spring:
  application:
    name: yearbook-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.tqdosxaesqbwbhngvndj.supabase.co:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.tqdosxaesqbwbhngvndj}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

