# 本地开发 profile - 使用 H2 内存数据库，无需 Supabase 连接
spring:
  datasource:
    url: jdbc:h2:mem:yearbook;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: ""

logging:
  level:
    com.chronicle: DEBUG
