name: Deploy Prototype (gh-pages branch)

permissions:
  contents: write
  pages: write

on:
  push:
    branches: [feature/prototype-ui]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 构建前端 Vue 应用
      - name: Build frontend
        run: cd frontend && npm ci && npm run build && cp dist/index.html dist/404.html
        env:
          VITE_SUPABASE_URL: https://tqdosxaesqbwbhngvndj.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxZG9zeGFlc3Fid2Jobmd2bmRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyODAxMzIsImV4cCI6MjA3ODg1NjEzMn0.YArQlOsSoHZZRO0Gwm4zyzvDGIRl1GimlosqSPUshz8
          VITE_BASE: /difangzhi/

      # 将 prototype/ 拷贝到 dist 下，和前端一起部署
      - name: Copy prototype into dist
        run: cp -r prototype frontend/dist/prototype

      # 尝试切换 Pages 源为 gh-pages 分支（需 pages:write，失败则忽略）
      - name: Switch Pages source to gh-pages branch (best-effort)
        continue-on-error: true
        run: |
          HTTP=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "HTTP $HTTP"; cat /tmp/pages.json

      # 将整合后的静态文件推送到 gh-pages 分支
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          commit_message: "deploy: prototype+frontend → gh-pages (${{ github.sha }})"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      # 尝试将分支加入 github-pages 环境（可能需要管理员权限，失败则忽略）
      - name: Add branch to github-pages env (best-effort)
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "AddPolicy HTTP: %{http_code}\n" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/environments/github-pages/deployment-branch-policies" \
            -d '{"name":"feature/prototype-ui","type":"branch"}'
