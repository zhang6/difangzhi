name: Deploy Prototype to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

on:
  push:
    branches: [feature/prototype-ui]

jobs:
  # 先将本分支加入 Pages 环境允许部署列表
  allow-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Add feature/prototype-ui to github-pages deployment policy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/environments/github-pages/deployment-branch-policies \
            -d '{"name":"feature/prototype-ui","type":"branch"}'

  deploy:
    needs: allow-branch
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload prototype artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototype

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
