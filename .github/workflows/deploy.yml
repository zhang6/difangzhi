name: Deploy to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main, feature/yearbook-system-v2, feature/yearbook-system-v3, feature/prototype-ui]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: cd frontend && npm ci && npm run build && cp dist/index.html dist/404.html
        env:
          VITE_SUPABASE_URL: https://tqdosxaesqbwbhngvndj.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxZG9zeGFlc3Fid2Jobmd2bmRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyODAxMzIsImV4cCI6MjA3ODg1NjEzMn0.YArQlOsSoHZZRO0Gwm4zyzvDGIRl1GimlosqSPUshz8
          VITE_BASE: /difangzhi/
      - name: Copy prototype to dist
        run: cp -r prototype frontend/dist/prototype
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - uses: actions/deploy-pages@v4
        id: deployment
